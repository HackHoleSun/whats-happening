name: Scrape Events

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC = 08:00 Belgrade time
  workflow_dispatch:       # allow manual runs

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/events.json scraper/geocode_cache.json
          git diff --quiet --cached || git commit -m "chore: update events.json [$(date -u +%Y-%m-%d)]"

      - name: Push changes
        run: git push
